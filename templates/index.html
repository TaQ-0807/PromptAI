<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptoAI</title>
  <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="会話履歴">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="logo">
          <div class="logo-icon">P</div>
          <span class="logo-text">Prompto<span class="logo-ai">AI</span></span>
        </div>
        <div class="header-divider"></div>
        <div class="header-tagline">Claude Code プロンプト生成アシスタント</div>
        <div class="header-right">
          <div class="save-status" id="saveStatus"></div>
          <button class="admin-btn hidden" id="adminBtn" onclick="openAdminPanel()" title="管理パネル">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
            </svg>
            管理
          </button>
          <button class="new-chat-btn" onclick="resetChat()" title="新しい会話">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            新しい会話
          </button>
        </div>
      </div>
    </header>

    <!-- Main content: sidebar + chat -->
    <div class="main-content">

      <!-- Sidebar -->
      <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">会話履歴</span>
        </div>
        <div class="sidebar-list" id="sidebarList">
          <div class="sidebar-empty" id="sidebarEmpty">
            まだ会話がありません
          </div>
        </div>
      </aside>

      <!-- Chat wrapper -->
      <div class="chat-wrapper">
        <main class="chat-area" id="chatArea">
          <div class="messages" id="messages"></div>
        </main>

        <footer class="input-area">
          <div class="input-wrapper">
            <div class="file-previews" id="filePreviews"></div>
            <div class="session-complete" id="sessionComplete">
              <div class="session-complete-icon">✓</div>
              <div class="session-complete-text">
                <strong>プロンプト生成完了</strong>
                <span>このセッションは終了しました</span>
              </div>
            </div>
            <div class="input-inner" id="inputInner">
              <textarea
                id="userInput"
                class="input-field"
                placeholder="作りたいツールについて教えてください..."
                rows="1"
              ></textarea>
              <button class="attach-btn" id="attachBtn" onclick="openFilePicker()" title="ファイルを添付（画像・PDF・Excel）">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
              </button>
              <button id="sendBtn" class="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
            <div class="input-hint">Enter で送信　Shift+Enter で改行　📎 画像・PDF・Excel を添付可</div>
          </div>
          <input type="file" id="fileInput" multiple
            accept="image/*,.pdf,.xlsx,.xls,.xlsm,application/pdf,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel,application/vnd.ms-excel.sheet.macroEnabled.12"
            style="display:none" onchange="handleFileSelect(event)">
        </footer>
      </div>

    </div>
  </div>

  <!-- ══ Login Modal ══════════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="loginModalOverlay">
    <div class="login-modal">
      <div class="login-modal-logo">
        <div class="logo-icon">P</div>
        <span class="logo-text">Prompto<span class="logo-ai">AI</span></span>
      </div>

      <!-- Tabs -->
      <div class="login-tabs">
        <button class="login-tab active" id="tabGuest" onclick="switchLoginTab('guest')">招待コード</button>
        <button class="login-tab" id="tabOwner" onclick="switchLoginTab('owner')">オーナー</button>
      </div>

      <!-- Guest pane -->
      <div class="login-pane" id="paneGuest">
        <p class="login-desc">招待コードを入力して開始してください。<br>1コードにつき1回プロンプトを生成できます。</p>
        <div class="code-input-wrapper">
          <input type="text" id="codeInput" class="code-input"
            placeholder="XXXX-XXXX" maxlength="9"
            autocomplete="off" spellcheck="false">
        </div>
        <div class="login-error" id="codeError"></div>
        <button class="login-submit-btn" id="codeSubmitBtn" onclick="submitCode()">開始する</button>
      </div>

      <!-- Owner pane -->
      <div class="login-pane hidden" id="paneOwner">
        <p class="login-desc">オーナーアカウントでログインします。</p>
        <input type="text" id="ownerUsername" class="owner-input"
          placeholder="ユーザー名" autocomplete="username">
        <input type="password" id="ownerPassword" class="owner-input"
          placeholder="パスワード" autocomplete="current-password">
        <div class="login-error" id="ownerError"></div>
        <button class="login-submit-btn" id="ownerLoginBtn" onclick="submitOwnerLogin()">ログイン</button>
      </div>
    </div>
  </div>

  <!-- ══ Admin Panel Modal ════════════════════════════════════════ -->
  <div class="modal-overlay hidden" id="adminModalOverlay" onclick="closeAdminPanel(event)">
    <div class="admin-modal" onclick="event.stopPropagation()">
      <div class="admin-modal-header">
        <div class="admin-modal-title">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
          </svg>
          管理パネル
        </div>
        <button class="admin-modal-close" onclick="closeAdminPanel()">✕</button>
      </div>

      <!-- Generate section -->
      <div class="admin-generate-section">
        <span class="admin-section-label">コードを発行</span>
        <div class="admin-count-btns">
          <button onclick="generateCodes(1)">1枚</button>
          <button onclick="generateCodes(3)">3枚</button>
          <button onclick="generateCodes(5)">5枚</button>
          <button onclick="generateCodes(10)">10枚</button>
        </div>
      </div>

      <!-- Code list -->
      <div class="admin-codes-header">
        <span id="adminCodesLabel">コード一覧</span>
        <button class="admin-refresh-btn" onclick="loadAdminCodes()" title="更新">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
      <div class="admin-codes-list" id="adminCodesList">
        <div class="admin-loading">読み込み中...</div>
      </div>

      <!-- Logout -->
      <button class="owner-logout-btn" onclick="ownerLogout()">ログアウト</button>
    </div>
  </div>

  <script src="/static/script.js?v=5"></script>
</body>
</html>
